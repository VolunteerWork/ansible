- name: Provision VPC and subnets
  hosts: local
  gather_facts: false
  roles:
    - vpc
  vars:
    task_state: present
  environment: "{{ environment_vars }}"

- name: Provision EKS stack
  hosts: local
  gather_facts: false
  roles:
    - eks
  vars:
    task_state: present
  environment: "{{ environment_vars }}"