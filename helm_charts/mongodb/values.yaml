image:
  repository: "mongo"
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true

initContainers: []

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

configmap:
  enabled: false

secret:
  enabled: false

env:
  - name: MONGO_INITDB_ROOT_USERNAME
    value: "admin"
  - name: MONGO_INITDB_ROOT_PASSWORD
    value: "Kobiet.123"
  - name: MONGO_INITDB_DATABASE
    value: "volunteerwork"

pvc:
  enabled: true
  accessMode: ReadWriteOnce
  storageClassName: gp2
  storage: 500Mi
  pvName: mongodb-pv
  mountPath: /data/db

service:
  type: ClusterIP
  port: 27017
  additionalPorts: []

ingress:
  enabled: false
  # className: ""
  # annotations: {}
  #   # kubernetes.io/ingress.class: nginx
  #   # kubernetes.io/tls-acme: "true"
  # hosts:
  #   - host: chart-example.local
  #     paths:
  #       - path: /
  #         pathType: ImplementationSpecific
  # tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

volumes: {}

volumeMounts: {}

nodeSelector: {}

tolerations: []

affinity: {}
