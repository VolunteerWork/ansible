image:
  repository: hungtran679/volunteerwork-frontend
  imageTag: latest
  pullPolicy: Always

serviceAccount:
  create: true

pvc:
  enabled: false

app:
  replicaCount: 1

  podLabels: {}
  podAnnotations: {}
  
  env: 
    - name: NEXT_PUBLIC_API_BASE_URL
      value: "/api"
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  livenessProbe:
    tcpSocket:
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    tcpSocket:
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3

rollout:
  enabled: false

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - paths:
        - path: "/"
          pathType: ImplementationSpecific
  tls: []

autoscaling:
  enabled: false