---
# Tasks to create EKS cluster in two private subnets

##########################################
# Gather existing resources by tags
##########################################
- name: Get VPC info
  amazon.aws.ec2_vpc_net_info:
    filters:
      "tag:Name": "{{ project_name }}-{{ env }}-vpc"
      "tag:Environment": "{{ env }}"
  register: vpc_info

- name: Validate VPC
  assert:
    that:
      - vpc_info.vpcs | length == 1
    fail_msg: "Expected exactly 1 VPC, found {{ vpc_info.vpcs | length }}"

- name: Set VPC ID
  set_fact:
    vpc_id: "{{ vpc_info.vpcs[0].id }}"
  when: vpc_info.vpcs | length > 0

- name: Get private subnets
  amazon.aws.ec2_vpc_subnet_info:
    filters:
      "tag:Name": "{{ project_name }}-{{ env }}-private-subnet-*"
      "tag:Environment": "{{ env }}"
  register: private_subnet_info

- name: Validate private subnets
  assert:
    that:
      - private_subnet_info.subnets | length == 2
    fail_msg: "Expected exactly 2 private subnets, found {{private_subnet_info.subnets | length }}"

- name: Set private subnet IDs  
  set_fact:
    private_subnet_ids: "{{ private_subnet_info.subnets | map(attribute='id') | list }}"
  when: private_subnet_info.subnets | length > 0

- name: Create IAM role for EKS cluster with policies
  amazon.aws.iam_role:
    name: "{{ project_name }}-{{ env }}-eks-cluster-role"
    description: "IAM role for EKS cluster"
    assume_role_policy_document: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Principal": {
              "Service": "eks.amazonaws.com"
            },
            "Action": "sts:AssumeRole"
          }
        ]
      }
    managed_policy:
      - "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"
      - "arn:aws:iam::aws:policy/AmazonEKSVPCResourceController"
    tags:
      Name: "{{ project_name }}-{{ env }}-eks-cluster-role"
      Environment: "{{ env }}"
    state: "present"
  register: eks_cluster_role

- name: Create IAM role for EKS node group
  amazon.aws.iam_role:
    name: "{{ project_name }}-{{ env }}-eks-node-role"
    description: "IAM role for EKS node group"
    assume_role_policy_document: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Principal": {
              "Service": "ec2.amazonaws.com"
            },
            "Action": "sts:AssumeRole"
          }
        ]
      }
    managed_policy:
      - "arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"
      - "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"
      - "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
    tags:
      Name: "{{ project_name }}-{{ env }}-eks-node-group-role"
      Environment: "{{ env }}"
    state: "present"
  register: eks_node_role

- name: Create security group for EKS cluster
  amazon.aws.ec2_group:
    name: "{{ project_name }}-{{ env }}-eks-sg"
    description: "Security group for EKS cluster"
    vpc_id: "{{ vpc_id }}"
    rules:
      - proto: tcp
        ports:
          - 443
        cidr_ip: 0.0.0.0/0
    rules_egress:
      - proto: all
        cidr_ip: 0.0.0.0/0
    region: "{{ region }}"
    tags:
      Name: "{{ project_name }}-{{ env }}-eks-sg"
      Environment: "{{ env }}"
    state: "present"
  register: eks_security_group

- name: Create EKS cluster
  community.aws.eks_cluster:
    name: "{{ project_name }}-{{ env }}-eks-cluster"
    version: "{{ eks_cluster_version }}"
    role_arn: "{{ eks_cluster_role.iam_role.arn }}"
    subnets: "{{ private_subnet_ids }}"
    security_groups:
      - "{{ eks_security_group.group_id }}"
    region: "{{ region }}"
    tags:
      Name: "{{ project_name }}-{{ env }}-eks-cluster"
      Environment: "{{ env }}"
    state: "present"
    wait: true
  register: eks_cluster_info

- name: Create EKS node group
  community.aws.eks_nodegroup:
    name: "{{ project_name }}-{{ env }}-eks-node-group"
    cluster_name: "{{ eks_cluster_info.name }}"
    subnets: "{{ private_subnet_ids }}"
    node_role: "{{ eks_node_role.iam_role.arn }}"
    instance_types: "{{ eks_node_instance_types }}"
    scaling_config:
      min_size: "{{ eks_node_group_min_size }}"
      max_size: "{{ eks_node_group_max_size }}"
      desired_size: "{{ eks_node_group_desired_size }}"
    disk_size: 20
    region: "{{ region }}"
    tags:
      Name: "{{ project_name }}-{{ env }}-eks-node-group"
      Environment: "{{ env }}"
    state: "present"
    wait: true
  register: eks_node_group_info