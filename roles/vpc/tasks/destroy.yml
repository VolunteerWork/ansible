##########################################
# Gather existing resources by tags
##########################################
- name: Get VPC info
  amazon.aws.ec2_vpc_net_info:
    filters:
      "tag:Name": "{{ project_name }}-{{ env }}-vpc"
      "tag:Environment": "{{ env }}"
  register: vpc_info

- name: Validate VPC
  assert:
    that:
      - vpc_info.vpcs | length == 1
    fail_msg: "Expected exactly 1 VPC, found {{ vpc_info.vpcs | length }}"

- name: Set VPC ID
  set_fact:
    vpc_id: "{{ vpc_info.vpcs[0].id }}"
  when: vpc_info.vpcs | length > 0

##########################################
# Route Tables (DELETE FIRST)
##########################################
- name: Delete public route table
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ vpc_id }}"
    tags:
      Name: "{{ project_name }}-{{ env }}-public-rt"
      Environment: "{{ env }}"
    state: absent
  when: vpc_id is defined

- name: Delete private route table
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ vpc_id }}"
    tags:
      Name: "{{ project_name }}-{{ env }}-private-rt"
      Environment: "{{ env }}"
    state: absent
  when: vpc_id is defined

##########################################
# NAT Gateway
##########################################
- name: Get NAT Gateway info
  amazon.aws.ec2_vpc_nat_gateway_info:
    filters:
      "tag:Name": "{{ project_name }}-{{ env }}-nat-gw"
      "tag:Environment": "{{ env }}"
  register: nat_info

- name: Delete NAT Gateway
  amazon.aws.ec2_vpc_nat_gateway:
    nat_gateway_id: "{{ nat_info.result[0].nat_gateway_id }}"
    state: absent
  when: nat_info.result | length > 0

##########################################
# Release Elastic IP
##########################################
- name: Release Elastic IP
  amazon.aws.ec2_eip:
    state: absent
    tags:
      Name: "{{ project_name }}-{{ env }}-nat-eip"
      Environment: "{{ env }}"

##########################################
# Internet Gateway
##########################################
- name: Delete Internet Gateway
  amazon.aws.ec2_vpc_igw:
    vpc_id: "{{ vpc_id }}"
    state: absent
    tags:
      Name: "{{ project_name }}-{{ env }}-igw"
      Environment: "{{ env }}"

##########################################
# Subnets
##########################################
- name: Get subnets
  amazon.aws.ec2_vpc_subnet_info:
    filters:
      "vpc-id": "{{ vpc_id }}"
      "tag:Environment": "{{ env }}"
  register: subnet_info

- name: Delete subnets
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ vpc_id }}"
    cidr: "{{ item.cidr_block }}"
    state: absent
  loop: "{{ subnet_info.subnets }}"
  when: subnet_info.subnets | length > 0

##########################################
# VPC (LAST)
##########################################
- name: Delete VPC
  amazon.aws.ec2_vpc_net:
    vpc_id: "{{ vpc_id }}"
    state: absent
  when: vpc_id is defined