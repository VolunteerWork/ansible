##########################################
# VPC Creation and Subnet Setup
##########################################
- name: Create VPC
  amazon.aws.ec2_vpc_net:
    name: "{{ project_name }}-{{ env }}-vpc"
    cidr_block: "{{ vpc_cidr }}"
    region: "{{ region }}"
    tags:
      Name: "{{ project_name }}-{{ env }}-vpc"
      Environment: "{{ env }}"
    state: "present"
  register: vpc

- name: Create public subnets
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ vpc.vpc.id }}"
    cidr: "{{ item.cidr }}"
    az: "{{ availability_zones[index] }}"
    map_public: yes
    tags:
      Name: "{{ project_name }}-{{ env }}-public-subnet-{{ index }}"
      Environment: "{{ env }}"
      "kubernetes.io/cluster/{{ eks_cluster_name }}": "shared"
      "kubernetes.io/role/internal-elb": "1"
    state: "present"
  loop: "{{ public_subnets }}"
  loop_control:
    index_var: index
  register: public_subnet_results

- name: Create private subnets
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ vpc.vpc.id }}"
    cidr: "{{ item.cidr }}"
    az: "{{ availability_zones[index] }}"
    map_public: no
    tags:
      Name: "{{ project_name }}-{{ env }}-private-subnet-{{ index }}"
      Environment: "{{ env }}"
    state: "present"
  loop: "{{ private_subnets }}"
  loop_control:
    index_var: index
  register: private_subnet_results

##########################################
# IGW
##########################################
- name: Create Internet Gateway
  amazon.aws.ec2_vpc_igw:
    vpc_id: "{{ vpc.vpc.id }}"
    state: "present"
    tags:
      Name: "{{ project_name }}-{{ env }}-igw"
      Environment: "{{ env }}"
  register: igw

##########################################
# NAT GW
##########################################
- name: Check for existing NAT EIP
  amazon.aws.ec2_eip_info:
    filters:
      "tag:Name": "{{ project_name }}-{{ env }}-nat-eip"
      "tag:Environment": "{{ env }}"
  register: existing_eips

- name: Allocate Elastic IP
  amazon.aws.ec2_eip:
    state: "present"
    tags:
      Name: "{{ project_name }}-{{ env }}-nat-eip"
      Environment: "{{ env }}"
  register: nat_eip
  when: existing_eips.addresses | length == 0


- name: Create NAT Gateway
  amazon.aws.ec2_vpc_nat_gateway:
    subnet_id: "{{ public_subnet_results.results[0].subnet.id }}"
    allocation_id: "{{ nat_eip.allocation_id }}"
    state: "present"
    tags:
      Name: "{{ project_name }}-{{ env }}-nat-gw"
      Environment: "{{ env }}"
  register: nat_gw
  when: nat_eip.skipped is not defined or not nat_eip.skipped

##########################################
# Route Tables
##########################################
- name: Create public route table
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ vpc.vpc.id }}"
    subnets: "{{ public_subnet_results.results | map(attribute='subnet.id') | list }}"
    routes:
      - dest: "0.0.0.0/0"
        gateway_id: "{{ igw.gateway_id }}"
    tags:
      Name: "{{ project_name }}-{{ env }}-public-rt"
      Environment: "{{ env }}"
    state: "present"
  register: public_rt

- name: Create private route table
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ vpc.vpc.id }}"
    subnets: "{{ private_subnet_results.results | map(attribute='subnet.id') | list }}"
    routes:
      - dest: "0.0.0.0/0"
        nat_gateway_id: "{{ nat_gw.nat_gateway_id }}"
    tags:
      Name: "{{ project_name }}-{{ env }}-private-rt"
      Environment: "{{ env }}"
    state: "present"
  register: private_rt
  when: nat_eip.skipped is not defined or not nat_eip.skipped