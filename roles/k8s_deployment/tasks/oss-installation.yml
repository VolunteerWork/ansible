---
# tasks/oss-installation.yml

# =========================
# EKS ADD-ONS
# =========================
- name: Install VPC CNI addon
  command: >
    aws eks create-addon
    --cluster-name {{ eks_cluster_name }}
    --addon-name vpc-cni
    --region {{ region }}
  register: vpc_cni_result
  failed_when: false
  changed_when: "'already exists' not in vpc_cni_result.stderr"

- name: Install CoreDNS addon
  command: >
    aws eks create-addon
    --cluster-name {{ eks_cluster_name }}
    --addon-name coredns
    --region {{ region }}
  register: coredns_result
  failed_when: false
  changed_when: "'already exists' not in coredns_result.stderr"

- name: Install kube-proxy addon
  command: >
    aws eks create-addon
    --cluster-name {{ eks_cluster_name }}
    --addon-name kube-proxy
    --region {{ region }}
  register: kube_proxy_result
  failed_when: false
  changed_when: "'already exists' not in kube_proxy_result.stderr"

- name: Install EBS CSI Driver addon
  command: >
    aws eks create-addon
    --cluster-name {{ eks_cluster_name }}
    --addon-name aws-ebs-csi-driver
    --region {{ region }}
  register: ebs_csi_result
  failed_when: false
  changed_when: "'already exists' not in ebs_csi_result.stderr"

# =========================
# HELM REPO (NGINX INGRESS)
# =========================
- name: Add ingress-nginx Helm repo
  command: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
  register: helm_repo_add
  failed_when: false
  changed_when: "'already exists' not in helm_repo_add.stderr"

- name: Update Helm repos
  command: helm repo update
  changed_when: false

# =========================
# INSTALL NGINX INGRESS
# =========================
- name: Install NGINX Ingress Controller via Helm
  command: >
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
    --namespace ingress-nginx
    --create-namespace
    -f {{ role_path }}/../helm_charts/nginx-ingress/values.custom.yaml
  register: helm_install_result

- name: Wait for ingress controller pods to be ready
  command: kubectl rollout status deployment/ingress-nginx-controller -n ingress-nginx
  register: rollout_status
  changed_when: false

# =========================
# INSTALL MONGODB
# =========================
- name: Install MongoDB via Helm
  command: >
    helm install --install mongodb {{ role_path }}/../helm_charts/mongodb
    --namespace db
    --create-namespace
  register: helm_install_result

- name: Wait for MongoDB pods to be ready
  command: kubectl rollout status deployment/mongodb -n db
  register: rollout_status
  changed_when: false