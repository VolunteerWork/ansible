- name: Deploy backend in EKS cluster
  import_tasks: app-deployment.yml
  vars:
    helm_name: "backend"
    helm_path: "{{ role_path }}/../../helm_charts/backend"
    app_ns: "app"

- name: Deploy frontend in EKS cluster
  import_tasks: app-deployment.yml
  vars:
    helm_name: "frontend"
    helm_path: "{{ role_path }}/../../helm_charts/frontend"
    app_ns: "app"